name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build (static)
        run: CGO_ENABLED=0 go build ./cmd/caldav-share
