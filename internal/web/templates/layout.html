{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}calshare{{end}}</title>
<link rel="stylesheet" href="/static/app.css">
<script src="/static/htmx.min.js" defer></script>
</head>
<body>
<div class="window">
  <header class="leather">
    <h1>calshare</h1>
    <p class="tagline">your calendars, shared on your terms</p>
  </header>
  <div class="torn"></div>
  <div class="toolbar">
    <nav>
      <a href="/" class="{{if eq .Active "home"}}active{{end}}">Home</a>
      <a href="/calendars" class="{{if eq .Active "calendars"}}active{{end}}">Calendars</a>
      <a href="/sources" class="{{if eq .Active "sources"}}active{{end}}">Subscriptions</a>
      <a href="/views" class="{{if eq .Active "views"}}active{{end}}">Views</a>
      <a href="/devices" class="{{if eq .Active "devices"}}active{{end}}">Devices</a>
      {{if .User.IsAdmin}}<a href="/admin" class="{{if eq .Active "admin"}}active{{end}}">Admin</a>{{end}}
    </nav>
    <span class="spacer"></span>
    <span class="who">{{.User.DisplayName}}</span>
    <form method="post" action="/logout" style="margin:0 0 0 8px">
      <button class="btn btn-secondary btn-sm" type="submit">Sign out</button>
    </form>
  </div>
  <main class="content">
    {{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
    {{block "content" .}}{{end}}
  </main>
</div>
</body>
</html>{{end}}
