server {
    listen 80;
    listen [::]:80;
    server_name vulpes.calshare.fyi;

    # Serve ACME challenge directly
    location ^~ /.well-known/acme-challenge/ {
        root /config/www;
        allow all;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    server_name vulpes.calshare.fyi;

    add_header Alt-Svc 'h3=":443"; ma=86400';

    ssl_certificate     /etc/letsencrypt/live/vulpes.calshare.fyi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vulpes.calshare.fyi/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache   shared:SSL_CALENDAR:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    access_log /config/log/nginx/calendar.access.log;
    error_log  /config/log/nginx/calendar.error.log warn;

    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # CalDAV PUT bodies (events with ATTACH inline, large recurring series with
    # many EXDATEs) and outbound ICS feeds for views with hundreds of events can
    # reach a few MB. 10M is comfortably above realistic sizes.
    client_max_body_size 10m;
    client_body_timeout  120s;
    client_header_timeout 60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    proxy_http_version 1.1;
    proxy_redirect off;

    # CalDAV REPORT/PROPFIND on large home sets can take a while
    # (server-side recurrence expansion, sync-collection deltas).
    # Default 60s is too aggressive for these clients.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # CalDAV uses non-standard HTTP verbs (PROPFIND, REPORT, MKCALENDAR,
    # MKCOL, MOVE, COPY) defined by RFC 4918 / 4791. Nginx proxies arbitrary
    # methods by default; no method filter is enabled here.
    #
    # If ngx_http_dav_module is ever loaded at the http{} level, EXCLUDE this
    # server block from it — the upstream Go app handles CalDAV itself and
    # nginx must not consume those verbs.

    # /.well-known/caldav is the iOS / macOS auto-discovery endpoint
    # (RFC 6764). The upstream emits a 301 redirect to the principal
    # collection; nginx just passes through.
    #
    # All app traffic — CalDAV verbs, OIDC login, share-link ICS feeds,
    # Google/Microsoft Graph webhooks under /webhooks/ — lives here.
    location / {
        proxy_pass http://caldav-share:8080;
    }
}
